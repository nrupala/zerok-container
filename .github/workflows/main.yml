name: Build APK and PWA

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          VERSION=$(echo $VERSION | tr -d '\n\r' | xargs)
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Gradle
        run: |
          cd android
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle.zip
          rm gradle.zip

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradle-8.2/bin/gradle
          gradle-8.2/bin/gradle assembleDebug --no-daemon

      - name: Set APK version
        if: success()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            mv "$APK_PATH" "android/app/build/outputs/apk/debug/zerok-$VERSION.apk"
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zerok-apk-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/debug/zerok-*.apk
          if-no-files-found: error

  build-pwa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PWA
        run: |
          echo "Validating PWA files..."
          ls -la pwa/

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerok-pwa
          path: pwa/
          if-no-files-found: error