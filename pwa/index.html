<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minimal PWA - Zero-knowledge encryption">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Zerok PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="container">
    <header>
      <h1>Zerok Vault</h1>
      <p class="tagline">Zero-knowledge PWA</p>
    </header>

    <main id="app">
      <section id="auth" class="card">
        <h2>Unlock Vault</h2>
        <input type="password" id="password" placeholder="Password (min 8 chars)" minlength="8">
        <button id="unlock">Unlock</button>
        <p class="error" id="error"></p>
      </section>

      <section id="vault" class="card hidden">
        <h2>Add Files</h2>
        <div class="dropzone" id="dropzone">
          <p>Drop files or click to browse</p>
          <input type="file" id="fileinput" multiple hidden>
        </div>
        <ul id="filelist"></ul>
      </section>
    </main>

    <footer>
      <p>End-to-end encrypted • Zero knowledge</p>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
