<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Zerok Vault - Zero-knowledge encrypted file vault">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zerok Vault">
  <title>Zerok Vault</title>
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="zerok.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Zerok Vault</h1>
      <p class="tagline">Zero-knowledge encryption</p>
    </header>

    <main id="app">
      <div class="card">
        <p>Loading vault...</p>
      </div>
    </main>

    <footer>
      <p>End-to-end encrypted - Zero knowledge</p>
    </footer>
  </div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[Zerok Error]', msg, 'at line', line);
      document.getElementById('app').innerHTML = '<div class="card"><p class="error">Error: ' + msg + '</p><p>Line: ' + line + '</p></div>';
      return true;
    };
  </script>
  <script src="zerok-vault.js?nocache=20"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(e) { console.log('SW:', e); });
    }
  </script>
</body>
</html>
